# .gitlab-ci.yml
stages:
  - build

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

build:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  parallel:
    matrix:
      - NAME: seller-bot
        CONTEXT: ./
        DOCKERFILE: ./Dockerfile
      - NAME: support-bot
        CONTEXT: ./
        DOCKERFILE: ./Dockerfile_support
      - NAME: dashboard
        CONTEXT: ./dashboard
        DOCKERFILE: ./dashboard/Dockerfile
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/$NAME"
    - SHORT_SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
    # immutable per-build tags
    - TAGS="-t $IMAGE:sha-$SHORT_SHA -t $IMAGE:build-$CI_PIPELINE_IID"
    # moving environment tags
    - if [ "$CI_COMMIT_BRANCH" = "main" ]; then TAGS="$TAGS -t $IMAGE:latest"; fi
    - if [ "$CI_COMMIT_BRANCH" = "develop" ]; then TAGS="$TAGS -t $IMAGE:staging"; fi
    - docker build $TAGS -f "$DOCKERFILE" "$CONTEXT"
    - docker push --all-tags "$IMAGE"
