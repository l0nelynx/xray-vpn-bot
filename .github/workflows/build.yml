# .github/workflows/build.yml
name: Build and Push Docker

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Define image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "TAG=staging" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # автоматически доступен

      - name: Build and push seller-bot
        uses: docker/build-push-action@v5
        with:
          context: ./
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/seller-bot:${{ steps.tag.outputs.TAG }}

      - name: Build and push support-bot
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile_support
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/support-bot:${{ steps.tag.outputs.TAG }}

      - name: Build and push dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dashboard:${{ steps.tag.outputs.TAG }}