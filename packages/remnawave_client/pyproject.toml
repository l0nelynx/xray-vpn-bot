[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "remnawave-client"
version = "0.1.0"
description = "Shared Remnawave SDK wrapper and subscription operations used by app/miniapp/dashboard."
requires-python = ">=3.11"
dependencies = [
    "remnawave>=2.1.13",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["remnawave_client*"]
