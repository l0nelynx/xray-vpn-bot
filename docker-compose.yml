services:
  seller-bot:
    container_name: cheezy-vpn-bot
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ./db/db.sqlite3
        target: /usr/src/app/db.sqlite3
      - /var/lib/marzban/certs/:/usr/src/app/uvicorn/ssl
      - ./config.yml:/usr/src/app/config.yml
      - ./dig_data.json:/usr/src/app/dig_data.json
    ports:
      - "5000:5000"
    restart: unless-stopped
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  support-bot:
    container_name: cheezy-sup-bot
    build:
      context: .
      dockerfile: Dockerfile_support
    volumes:
      - type: bind
        source: ./db/db.sqlite3
        target: /usr/src/app/db/db.sqlite3
      - ./config.yml:/usr/src/app/config.yml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "support.py", "|", "grep", "-v", "grep"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
