services:
  cheezy-vpn-bot:
    image: spicycheeze/xray-vpn-bot-cheezy:vpn
#    build:
#      context: .
#      dockerfile: Dockerfile_old
    volumes:
      - type: bind
        source: ./db/db.sqlite3
        target: /usr/src/app/dist/db.sqlite3
      - /var/lib/marzban/certs/:/usr/src/app/uvicorn/ssl
      - ./config.yml:/usr/src/app/dist/config.yml
      - ./dig_data.json:/usr/src/app/dist/dig_data.json
    ports:
      - "5000:5000"
    restart: unless-stopped
    tty: true
    stdin_open: true
  cheezy-sup-bot:
    image: spicycheeze/xray-vpn-bot-cheezy:support
#    build:
#      context: .
#      dockerfile: Dockerfile_support_old
    volumes:
      - ./config.yml:/usr/src/app/dist/config.yml
    restart: unless-stopped
