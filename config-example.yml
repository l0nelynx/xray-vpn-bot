# Telegram VPN Bot Configuration
# Copy this file to config.yml and fill in your actual values
# NEVER commit config.yml to git - it contains sensitive data!

# ===== MAIN =====
branding_name: "YourVPN"                           # Service name shown to users
support_bot_id: "@YourSupportBot"                  # Support bot @username mention
news_url: "https://t.me/YourNewsChannel"           # News / announcements channel
agreement_url: "https://example.com/agreement"     # User agreement URL
policy_url: "https://example.com/policy"           # Privacy policy URL
uvicorn_host: "0.0.0.0"                            # Webhook server host
uvicorn_port: 5000                                 # Webhook server port
# uvicorn_ssl_key: "./uvicorn/ssl/key.pem"         # (disabled: SSL is terminated upstream, see app/settings.py)
# uvicorn_ssl_cert: "./uvicorn/ssl/fullchain.pem"  # (disabled)

# ===== BOTS =====
token: "yourbottoken"                              # Main user-facing bot token
support_token: "yoursupportbottoken"               # Support bot token
admin_bot_token: "youradminbottoken"               # Admin bot token (admin panel / broadcasts)
admin_id: 123456789                                # Admin Telegram user ID
news_id: -1001234567890                            # News channel ID (numeric, for broadcasts)

# ===== REMNAWAVE =====
remnawave_url: "https://panel.example.com"         # Remnawave panel URL
remnawave_token: "your-remnawave-api-token"        # Remnawave API token (long-lived JWT)
rw_free_id: "uuid-of-free-squad"                   # Internal Squad ID used for FREE plan users
rw_pro_id: "uuid-of-pro-squad"                     # Internal Squad ID used for PRO plan users
rw_ext_free_id: "uuid-of-ext-free-squad"           # External Squad ID for FREE users (no extended access)
rw_ext_pro_id: "uuid-of-ext-pro-squad"             # External Squad ID for PRO users (extended access)

# ===== DASHBOARD =====
dashboard_login: admin                             # Dashboard admin login
dashboard_password: change-me                      # Dashboard admin password
dashboard_secret: change-me-to-random-string       # JWT secret for dashboard sessions

# ===== TELEMT (external server management) =====
telemt_server: "https://telemt.example.com"        # Telemt API base URL (host management)
telemt_header: "your-telemt-auth-header"           # Authorization header value for Telemt

# ===== PROMO =====
promo_discount: 20                                 # Discount (%) granted by a promo code
promo_days_reward: 3                               # Extra days granted by a promo code
admin_logs_length: 20                              # Number of recent ERROR rows shown in admin logs panel

# ===== PAYMENT GATEWAY: CRYPTOBOT =====
crypto_bot_token: "your_cryptobot_api_token"       # CryptoBot API token

# ===== PAYMENT GATEWAY: CRYSTAL PAY =====
crystal_login: "your_crystal_login"
crystal_secret: "your_crystal_secret"
crystal_salt: "your_crystal_salt"
crystal_webhook: "https://example.com:5000/crystal_webhook"  # Crystal Pay webhook URL

# ===== PAYMENT GATEWAY: A-PAYS =====
apay_id: 1234                                      # A-Pays merchant ID
apay_secret: "your_apay_secret"                    # A-Pays secret key
apay_api_url: "https://apays.io"

# ===== BASE PRICES =====
# These values are used only on first launch to seed default tariffs.
# After deployment, manage tariffs and menus through the Dashboard.
stars_price: 150                                   # 1-month base price in Telegram Stars
crypto_price: 2                                    # 1-month base price in USDT
sbp_price: 150                                     # 1-month base price in RUB (SBP)
discount: 5                                        # Base discount (%) for plans of 3+ months
free_traffic: 10                                   # Traffic limit (GB) for FREE plan
free_days: 30                                      # Duration (days) for FREE plan

# ===== LEGACY (kept for backwards compatibility - not required for new deploys) =====
# marz_url: "https://example.com:8000"
# auth_name: "username"
# auth_pass: "password"

# ===== NOTES =====
# 1. Replace every placeholder with real credentials.
# 2. URLs must include protocol (https:// or http://).
# 3. For production, terminate TLS on a reverse proxy (nginx, Caddy, Traefik).
# 4. Keep this file out of version control.
# 5. Fill in only the payment gateway blocks you actually use.
# 6. Ensure the firewall allows the configured uvicorn_port (default: 5000).
